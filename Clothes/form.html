<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"    content="width=device-width, initial-scale=1">
  <title>MyClothes — Оформление заказа</title>
  <link rel="icon" href="assets/favicon.ico">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.4.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-…"
    crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="bg-dark">
    <nav class="navbar navbar-expand-lg navbar-dark container">
      <a class="navbar-brand" href="index.html"><img src="assets/logo.svg" height="40" alt="MyClothes"></a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Каталог</a></li>
        <li class="nav-item"><a class="nav-link active" href="form.html">Заказ</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content -->
  <main class="container my-5">

    <!-- Order Form -->
    <h1 class="mb-4">Оформление заказа</h1>
    <form class="p-4 border rounded" action="#" method="post">
      <!-- Имя -->
      <div class="mb-3">
        <label for="name" class="form-label">Имя</label>
        <input type="text" id="name" name="name" class="form-control" required>
      </div>
      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>
      <!-- Телефон -->
      <div class="mb-3">
        <label for="phone" class="form-label">Телефон</label>
        <input type="tel" id="phone" name="phone" class="form-control">
      </div>
      <!-- Адрес -->
      <div class="mb-3">
        <label for="address" class="form-label">Адрес</label>
        <input type="text" id="address" name="address" class="form-control">
      </div>
      <!-- Товар -->
      <div class="mb-3">
        <label for="product" class="form-label">Товар</label>
        <select id="product" name="product" class="form-select">
          <option>Basic Sweater</option>
          <option>Sheer-t T-shirt</option>
          <option>Midi Skirt</option>
        </select>
      </div>
      <!-- Количество -->
      <div class="mb-3">
        <label for="quantity" class="form-label">Количество</label>
        <input type="number" id="quantity" name="quantity" class="form-control" value="1" min="1">
      </div>
      <!-- Checkbox -->
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="agree" required>
        <label class="form-check-label" for="agree">
          Согласен с условиями
        </label>
      </div>
      <!-- Кнопка -->
      <button type="submit" class="btn btn-primary w-100">Отправить заказ</button>
    </form>

  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white py-3">
    <div class="container text-center">
      © 2025 MyClothes
    </div>
  </footer>

</body>
</html>

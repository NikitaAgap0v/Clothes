<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"    content="width=device-width, initial-scale=1">
  <title>MyClothes — Главная</title>
  <!-- favicon -->
  <link rel="icon" href="assets/favicon.ico">
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.4.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-…"
    crossorigin="anonymous">
  <!-- Ваши стили -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="bg-dark">
    <nav class="navbar navbar-expand-lg navbar-dark container">
      <a class="navbar-brand" href="index.html">
        <img src="assets/logo.svg" alt="MyClothes" height="40">
      </a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html">Главная</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Каталог</a></li>
        <li class="nav-item"><a class="nav-link" href="form.html">Заказ</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content -->
  <main class="container my-5">

    <!-- Hero -->
    <section class="p-5 bg-warning rounded text-center mb-5">
      <h1 class="display-5">Летняя коллекция 2025</h1>
      <p class="lead">Свежие модели уже в продаже!</p>
      <a href="products.html" class="btn btn-dark btn-lg">Купить сейчас</a>
    </section>

    <!-- Хиты продаж -->
    <h2 class="mb-4">Хиты продаж</h2>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
      <!-- Товар #1 -->
      <div class="col">
        <div class="card h-100">
          <img src="assets/product1.jpg" class="card-img-top" alt="Basic Sweater">
          <div class="card-body">
            <h5 class="card-title">Basic Sweater</h5>
            <p class="card-text">€29</p>
          </div>
        </div>
      </div>
      <!-- Товар #2 -->
      <div class="col">
        <div class="card h-100">
          <img src="assets/product2.jpg" class="card-img-top" alt="Sheer-t T-shirt">
          <div class="card-body">
            <h5 class="card-title">Sheer-t T-shirt</h5>
            <p class="card-text">€19</p>
          </div>
        </div>
      </div>
      <!-- Товар #3 -->
      <div class="col">
        <div class="card h-100">
          <img src="assets/product3.jpg" class="card-img-top" alt="Midi Skirt">
          <div class="card-body">
            <h5 class="card-title">Midi Skirt</h5>
            <p class="card-text">€39</p>
          </div>
        </div>
      </div>
      <!-- Добавьте ещё карточки по образцу -->
    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white py-3">
    <div class="container text-center">
      © 2025 MyClothes
    </div>
  </footer>

</body>
</html>
